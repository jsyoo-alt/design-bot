# Railway nixpacks 빌드 설정
# Python(FastAPI) + Node.js(Puppeteer) 혼합 환경

# Railway nixpacks 빌드 설정
# Python은 requirements.txt 감지로 자동 설치됨
# Node.js + Chromium 의존 라이브러리만 명시

[phases.setup]
nixPkgs = [
  "nodejs_20",
  # Puppeteer Chromium 의존 라이브러리
  "nss", "nspr", "atk", "cups", "pango", "cairo",
  "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage",
  "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb",
  "libxkbcommon", "alsa-lib", "at-spi2-atk", "dbus",
  "expat", "fontconfig", "freetype", "glib", "gtk3",
  "libdrm", "mesa",
]

# install 단계는 nixpacks 자동 감지에 위임
# requirements.txt → pip install 자동 실행
# package.json     → npm install 자동 실행

[start]
cmd = "python start.py"
